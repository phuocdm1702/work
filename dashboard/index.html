<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Learning Dashboard - Python Fullstack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
        }

        .code-font {
            font-family: 'JetBrains+Mono', monospace;
        }

        .sidebar-item-active {
            background-color: #334155;
            border-left: 4px solid #38bdf8;
        }

        [x-cloak] {
            display: none !important;
        }

        .surface {
            background-color: #1e293b;
            border: 1px solid #334155;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        .docs-content h2 {
            scroll-margin-top: 5rem;
        }
    </style>
</head>

<body x-data="cmsApp()" x-init="init()" class="h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside :class="sidebarOpen ? 'w-64' : 'w-20'" class="surface h-full flex flex-col transition-all duration-300 z-30">
        <div class="p-6 flex items-center gap-3">
            <div class="w-8 h-8 bg-sky-500 rounded flex items-center justify-center font-bold text-white">P</div>
            <span x-show="sidebarOpen" class="font-bold text-lg tracking-tight" x-cloak>Python CMS</span>
        </div>

        <nav class="flex-1 px-4 space-y-2 mt-4">
            <template x-for="item in menuItems" :key="item.id">
                <button @click="window.location.hash = '#/' + item.id; if(item.id === 'docs') { sidebarOpen = false; }"
                    :class="currentTab === item.id ? 'sidebar-item-active text-sky-400' : 'text-slate-400 hover:bg-slate-800'"
                    class="w-full flex items-center p-3 rounded-lg transition-colors group">
                    <span x-html="item.icon" class="w-6 h-6"></span>
                    <span x-show="sidebarOpen" x-text="item.label" class="ml-3 font-medium" x-cloak></span>
                </button>
            </template>
        </nav>

        <div class="p-4 border-t border-slate-700">
            <button @click="sidebarOpen = !sidebarOpen"
                class="w-full flex justify-center p-2 text-slate-400 hover:text-white">
                <svg x-show="sidebarOpen" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
                </svg>
                <svg x-show="!sidebarOpen" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor" x-cloak>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 5l7 7-7 7M5 5l7 7-7 7" />
                </svg>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden relative">
        <!-- Top Header -->
        <header class="h-16 surface flex items-center justify-between px-8 z-20">
            <div class="flex items-center gap-4">
                <h2 class="text-xl font-semibold" x-text="getPageTitle()"></h2>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex flex-col items-end">
                    <span class="text-sm font-medium" x-text="settings.name"></span>
                    <span class="text-xs text-slate-400" x-text="currentTime"></span>
                </div>
                <div class="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center text-xl"
                    x-text="settings.avatar"></div>
            </div>
        </header>

        <!-- Page Area (Router Outlet) -->
        <div id="router-outlet" class="flex-1 overflow-y-auto p-8">
            <div class="flex items-center justify-center h-full">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-sky-500"></div>
            </div>
        </div>
    </main>

    <script>
        function cmsApp() {
            return {
                sidebarOpen: true,
                currentTab: 'dashboard',
                currentSession: 's01-setup',
                activeSessionData: null,
                currentTime: '',
                settings: { name: 'Developer', avatar: '👨‍💻' },
                gitTracker: { username: '', repo: '', commits: [] },
                gitLoading: false,
                commits: [],
                commitTypes: [
                    { label: 'feat', color: 'bg-green-500', desc: 'Tính năng mới' },
                    { label: 'fix', color: 'bg-red-500', desc: 'Sửa lỗi' },
                    { label: 'docs', color: 'bg-blue-500', desc: 'Tài liệu' },
                    { label: 'test', color: 'bg-amber-500', desc: 'Thêm/sửa test' },
                    { label: 'refactor', color: 'bg-purple-500', desc: 'Cải tiến code' },
                    { label: 'chore', color: 'bg-slate-500', desc: 'Bảo trì' }
                ],
                docs: {},
                roadmap: { phases: [] },
                menuItems: [
                    { id: 'dashboard', label: 'Dashboard', icon: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>' },
                    { id: 'roadmap', label: 'Roadmap', icon: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" /></svg>' },
                    { id: 'docs', label: 'Docs', icon: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>' },
                    { id: 'git', label: 'Git Tracker', icon: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" /></svg>' },
                    { id: 'progress', label: 'Progress', icon: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>' },
                    { id: 'settings', label: 'Settings', icon: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>' },
                ],
                stats: [
                    { label: 'Tiến độ tổng', value: '8%' },
                    { label: 'Giai đoạn', value: '1/11' },
                    { label: 'Streak', value: '1 ngày' },
                    { label: 'Commits', value: '5' }
                ],
                recentActivity: [
                    { id: 1, text: 'Nâng cấp nội dung Docs chuyên sâu', time: 'Vừa xong' },
                    { id: 2, text: 'Khởi tạo Roadmap 8 tháng đầy đủ', time: '5 phút trước' }
                ],
                progress: {
                    skills: { "Python": 3, "Logic": 2, "Git": 4, "Backend": 1 },
                    milestones: [
                        { id: 1, title: 'Hoàn thành Giai đoạn 1', deadline: '2024-04-20', completed: true },
                        { id: 2, title: 'Project 1: CMS Dashboard', deadline: '2024-05-01', completed: false }
                    ]
                },
                init() {
                    this.updateTime();
                    setInterval(() => this.updateTime(), 60000);
                    this.loadData();

                    // Client-side Router
                    window.addEventListener('hashchange', () => this.handleRouting());
                    this.handleRouting();
                },
                async handleRouting() {
                    let hash = window.location.hash || '#/dashboard';
                    const page = hash.replace('#/', '');
                    this.currentTab = page;

                    try {
                        const response = await fetch(`./pages/${page}.html`);
                        if (!response.ok) throw new Error('Page not found');
                        const html = await response.text();

                        const outlet = document.getElementById('router-outlet');
                        outlet.innerHTML = html;

                        // Re-initialize Alpine for new content
                        this.$nextTick(() => {
                            if (page === 'dashboard') this.initChart();
                            if (page === 'git') this.initGitTracker();
                            if (page === 'progress') this.loadProgress();
                        });
                    } catch (error) {
                        document.getElementById('router-outlet').innerHTML = `<div class="text-rose-500 p-8 flex flex-col items-center justify-center h-full">
                            <svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                            <h3 class="text-xl font-bold">Lỗi tải trang</h3>
                            <p class="text-slate-400 mt-2">${error.message}</p>
                            <p class="text-xs text-slate-500 mt-4 italic">Lưu ý: Bạn cần chạy qua một web server (như Live Server hoặc python -m http.server) để tính năng Routing hoạt động.</p>
                        </div>`;
                    }
                },
                loadProgress() {
                    const savedProgress = localStorage.getItem('cms_progress');
                    if (savedProgress) {
                        this.progress = JSON.parse(savedProgress);
                    }
                },
                initGitTracker() {
                    const savedGit = localStorage.getItem('cms_git');
                    if (savedGit) {
                        const parsed = JSON.parse(savedGit);
                        this.gitTracker = parsed;
                        this.gitConfig = { username: parsed.username, repo: parsed.repo };
                        if (this.gitTracker.username && this.gitTracker.repo && (!this.gitTracker.commits || this.gitTracker.commits.length === 0)) {
                            this.fetchCommits();
                        } else if (this.gitTracker.commits && this.gitTracker.commits.length > 0) {
                            this.commits = this.gitTracker.commits.map(c => ({
                                sha: c.id,
                                message: c.message,
                                type: c.type,
                                isValid: true,
                                date: c.date,
                                impact: c.impact
                            }));
                        }
                    }
                },
                updateTime() {
                    const now = new Date();
                    this.currentTime = now.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }) + ' - ' + now.toLocaleDateString('vi-VN');
                },
                async fetchCommits() {
                    if (!this.gitConfig.username || !this.gitConfig.repo) return;

                    this.gitLoading = true;
                    try {
                        const response = await fetch(`https://api.github.com/repos/${this.gitConfig.username}/${this.gitConfig.repo}/commits`);
                        if (!response.ok) throw new Error('Repo not found');
                        const data = await response.json();

                        this.commits = data.map(item => {
                            const msg = item.commit.message;
                            const regex = /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert|feat!|fix!)(\(.+\))?: (.+)/;
                            const match = msg.match(regex);

                            return {
                                sha: item.sha,
                                message: match ? match[3] : msg,
                                type: match ? match[1] : 'unknown',
                                isValid: !!match,
                                error: match ? null : 'Sai định dạng Conventional Commits',
                                date: item.commit.author.date
                            };
                        });

                        localStorage.setItem('cms_git', JSON.stringify({
                            username: this.gitConfig.username,
                            repo: this.gitConfig.repo
                        }));
                    } catch (error) {
                        alert('Lỗi: ' + error.message);
                    } finally {
                        this.gitLoading = false;
                    }
                },
                formatDate(dateStr) {
                    const d = new Date(dateStr);
                    return d.toLocaleDateString('vi-VN') + ' ' + d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
                },
                copyToClipboard(text) {
                    navigator.clipboard.writeText(text).then(() => {
                        alert('Đã copy mã nguồn!');
                    });
                },
                loadData() {
                    // Load Roadmap
                    fetch('../roadmap_data.json')
                        .then(res => res.json())
                        .then(data => {
                            this.roadmap = data;
                        });

                    // Load Docs from localStorage (initially populated by docs_data.js)
                    const savedDocs = localStorage.getItem('cms_docs');
                    if (savedDocs) {
                        this.docs = JSON.parse(savedDocs);
                        // Set initial active session
                        const firstPhase = Object.values(this.docs)[0];
                        if (firstPhase && firstPhase.sessions.length > 0) {
                            this.activeSessionData = firstPhase.sessions[0];
                            this.currentSession = this.activeSessionData.id;
                        }
                    }
                },
                getPageTitle() {
                    return this.menuItems.find(i => i.id === this.currentTab).label;
                },
                initChart() {
                    setTimeout(() => {
                        const ctx = document.getElementById('progressChart').getContext('2d');
                        new Chart(ctx, {
                            type: 'bar',
                            data: {
                                labels: ['GĐ 1', 'GĐ 2', 'GĐ 3', 'GĐ 4', 'GĐ 5'],
                                datasets: [{
                                    label: '% Hoàn thành',
                                    data: [35, 0, 0, 0, 0],
                                    backgroundColor: '#38bdf8',
                                    borderRadius: 6
                                }]
                            },
                            options: {
                                indexAxis: 'y',
                                responsive: true,
                                plugins: { legend: { display: false } },
                                scales: { x: { max: 100, grid: { display: false } }, y: { grid: { display: false } } }
                            }
                        });
                    }, 500);
                }
            }
        }
    </script>
</body>

</html>
