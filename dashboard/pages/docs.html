<div class="h-full flex flex-col" x-cloak>
    <div class="flex gap-6 h-full overflow-hidden">
        <!-- Tree Nav -->
        <aside class="w-72 flex flex-col gap-4 overflow-y-auto pr-2 custom-scrollbar">
            <div class="surface p-4 rounded-xl border-slate-700/50">
                <div class="flex items-center justify-between mb-4">
                    <h4 class="font-bold text-xs text-slate-500 uppercase tracking-widest">Tài liệu học tập</h4>
                    <div class="w-6 h-6 rounded bg-slate-800 flex items-center justify-center cursor-pointer hover:bg-slate-700">
                        <svg class="w-3 h-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                </div>
                <div class="space-y-4">
                    <template x-for="(phase, phaseKey) in docs" :key="phaseKey">
                        <div>
                            <div class="text-sky-400/80 font-bold text-sm mb-2 flex items-center gap-2">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7M5 5l7 7-7 7" />
                                </svg>
                                <span x-text="phase.title"></span>
                            </div>
                            <div class="pl-4 space-y-1 border-l border-slate-700/50 ml-1.5">
                                <template x-for="session in phase.sessions" :key="session.id">
                                    <div @click="currentSession = session.id; activeSessionData = session"
                                        :class="currentSession === session.id ? 'text-sky-400 bg-sky-500/10 border-sky-500/50' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 border-transparent'"
                                        class="cursor-pointer py-1.5 px-3 text-sm rounded transition-all border flex items-center justify-between group">
                                        <span x-text="session.title"></span>
                                        <svg x-show="currentSession === session.id" class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-8.707l-3-3a1 1 0 00-1.414 1.414L10.586 9H7a1 1 0 100 2h3.586l-1.293 1.293a1 1 0 101.414 1.414l3-3a1 1 0 000-1.414z" clip-rule="evenodd" />
                                        </svg>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </aside>

        <!-- Content Area -->
        <div class="flex-1 flex flex-col min-w-0">
            <template x-if="activeSessionData">
                <div class="flex h-full gap-6 overflow-hidden">
                    <article class="flex-1 surface rounded-xl border-slate-700/50 overflow-y-auto custom-scrollbar p-10 docs-content" id="docs-article">
                        <div class="max-w-4xl mx-auto">
                            <!-- Breadcrumbs -->
                            <div class="flex items-center gap-2 text-xs text-slate-500 mb-8 font-medium">
                                <span>Giai đoạn 1</span>
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                                </svg>
                                <span class="text-sky-500/80" x-text="activeSessionData.title"></span>
                            </div>

                            <h1 class="text-4xl font-extrabold text-white mb-6 tracking-tight" x-text="activeSessionData.title"></h1>
                            <p class="text-lg text-slate-400 mb-10 leading-relaxed" x-text="activeSessionData.content.intro"></p>

                            <!-- Theory Sections -->
                            <div class="space-y-12">
                                <template x-for="(section, sIndex) in activeSessionData.content.theory" :key="section.title">
                                    <div :id="'section-' + sIndex" class="space-y-4">
                                        <h2 class="text-2xl font-bold text-slate-100 flex items-center gap-3" x-text="section.title"></h2>

                                        <!-- Concept Type -->
                                        <template x-if="section.type === 'concept'">
                                            <div class="mb-8">
                                                <div class="prose dark:prose-invert max-w-none">
                                                    <p class="text-slate-400 leading-relaxed bg-slate-800/30 p-5 rounded-lg border border-slate-700/50 whitespace-pre-line"
                                                        x-html="section.text.replace(/\*\*(.*?)\*\*/g, '<strong class=\'text-indigo-400\'>$1</strong>')"></p>
                                                </div>
                                            </div>
                                        </template>

                                        <!-- Case Study Type -->
                                        <template x-if="section.type === 'case_study'">
                                            <div class="bg-blue-50 border-l-4 border-blue-500 p-5 my-6 dark:bg-blue-900/20 rounded-r-lg">
                                                <div class="flex items-center mb-3">
                                                    <svg class="w-5 h-5 text-blue-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                                                    </svg>
                                                    <h4 class="font-bold text-blue-800 dark:text-blue-300" x-text="section.title"></h4>
                                                </div>
                                                <p class="text-blue-700 dark:text-blue-200 leading-relaxed text-sm" x-text="section.text"></p>
                                            </div>
                                        </template>

                                        <!-- Comparison Type -->
                                        <template x-if="section.type === 'compare'">
                                            <div class="overflow-hidden rounded-xl border border-slate-700 shadow-2xl">
                                                <table class="w-full text-left border-collapse">
                                                    <thead>
                                                        <tr class="bg-slate-800">
                                                            <th class="p-4 text-xs uppercase tracking-wider text-slate-500 font-bold border-b border-slate-700">Đặc điểm</th>
                                                            <th class="p-4 text-xs uppercase tracking-wider text-sky-400 font-bold border-b border-slate-700">Python Way</th>
                                                            <th class="p-4 text-xs uppercase tracking-wider text-orange-400 font-bold border-b border-slate-700">Java Equivalent</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody class="divide-y divide-slate-700/50">
                                                        <template x-for="item in section.items" :key="item.label">
                                                            <tr class="hover:bg-slate-800/40 transition-colors">
                                                                <td class="p-4 text-sm font-bold text-slate-300" x-text="item.label"></td>
                                                                <td class="p-4 text-sm code-font text-sky-300/90" x-text="item.python"></td>
                                                                <td class="p-4 text-sm code-font text-orange-300/90" x-text="item.java"></td>
                                                            </tr>
                                                        </template>
                                                    </tbody>
                                                </table>
                                            </div>
                                        </template>

                                        <!-- Note/Tip Type -->
                                        <template x-if="section.type === 'note'">
                                            <div class="bg-amber-500/10 border-l-4 border-amber-500 p-5 rounded-r-lg">
                                                <h4 class="text-amber-400 font-bold mb-1 text-sm" x-text="section.title"></h4>
                                                <p class="text-amber-200/80 text-sm leading-relaxed" x-text="section.text"></p>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>

                            <!-- Code Samples -->
                            <div class="mt-16 space-y-8" id="section-code">
                                <h2 class="text-2xl font-bold text-white mb-6 flex items-center gap-3">
                                    <svg class="w-6 h-6 text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                                    </svg>
                                    Ví dụ thực hành
                                </h2>
                                <template x-for="sample in activeSessionData.content.code_samples" :key="sample.file">
                                    <div class="rounded-xl overflow-hidden border border-slate-700 shadow-2xl">
                                        <div class="bg-slate-800 px-4 py-2 flex items-center justify-between border-b border-slate-700">
                                            <div class="flex items-center gap-2">
                                                <div class="w-3 h-3 rounded-full bg-red-500/50"></div>
                                                <div class="w-3 h-3 rounded-full bg-amber-500/50"></div>
                                                <div class="w-3 h-3 rounded-full bg-green-500/50"></div>
                                                <span class="ml-2 text-xs font-mono text-slate-400" x-text="sample.file"></span>
                                            </div>
                                            <button @click="copyToClipboard(sample.code)" class="text-[10px] text-sky-400 hover:text-sky-300 uppercase tracking-widest font-bold">Copy</button>
                                        </div>
                                        <pre class="p-6 bg-[#0d1117] overflow-x-auto"><code class="code-font text-sm text-sky-300 leading-relaxed" x-text="sample.code"></code></pre>
                                    </div>
                                </template>
                            </div>

                            <!-- Exercises -->
                            <div class="mt-16 mb-20" id="section-exercises">
                                <h2 class="text-2xl font-bold text-white mb-6">Thực hành & Tư duy</h2>
                                <div class="grid gap-6">
                                    <template x-for="(ex, index) in activeSessionData.content.exercises" :key="ex.title">
                                        <div class="surface p-6 rounded-xl border-slate-700/50 hover:border-sky-500/30 transition-all">
                                            <div class="flex items-center gap-3 mb-4">
                                                <span class="w-6 h-6 rounded-full bg-sky-500 text-white flex items-center justify-center text-xs font-bold" x-text="index + 1"></span>
                                                <h4 class="font-bold text-slate-200" x-text="ex.title"></h4>
                                            </div>
                                            <p class="text-slate-400 text-sm mb-4 leading-relaxed" x-text="ex.desc"></p>
                                            <div x-data="{ open: false }">
                                                <button @click="open = !open" class="text-xs text-sky-500/80 hover:text-sky-400 underline underline-offset-4">Xem gợi ý</button>
                                                <div x-show="open" x-cloak class="mt-3 p-4 bg-slate-800/50 rounded text-xs text-slate-300 italic" x-text="ex.hint"></div>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </article>

                    <!-- Table of Contents (Right Side) -->
                    <aside class="w-64 hidden xl:block">
                        <div class="surface p-6 rounded-xl border-slate-700/50 sticky top-0">
                            <h4 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Mục lục bài viết</h4>
                            <ul class="space-y-3">
                                <template x-for="(section, index) in activeSessionData.content.theory" :key="index">
                                    <li>
                                        <a :href="'#section-' + index" class="text-sm text-slate-400 hover:text-sky-400 transition-colors block py-1 border-l-2 border-transparent pl-4" x-text="section.title"></a>
                                    </li>
                                </template>
                                <li><a href="#section-code" class="text-sm text-slate-400 hover:text-sky-400 transition-colors block py-1 border-l-2 border-transparent pl-4">Ví dụ thực hành</a></li>
                                <li><a href="#section-exercises" class="text-sm text-slate-400 hover:text-sky-400 transition-colors block py-1 border-l-2 border-transparent pl-4">Bài tập thực hành</a></li>
                            </ul>
                        </div>
                    </aside>
                </div>
            </template>
        </div>
    </div>
</div>
