<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Learning Dashboard - Python Fullstack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&family=Google+Sans:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            /* Typography Scale - Google Material Design */
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-display: 'Google Sans', 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

            /* Line heights */
            --leading-tight: 1.25;
            --leading-snug: 1.375;
            --leading-normal: 1.6;
            --leading-relaxed: 1.75;

            /* Spacing scale */
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 2.5rem;
            --space-12: 3rem;
            --space-16: 4rem;

            /* Colors - Enterprise Dark Theme */
            --color-text-primary: #e2e8f0;
            --color-text-secondary: #94a3b8;
            --color-text-muted: #64748b;
            --color-accent: #38bdf8;
            --color-accent-soft: rgba(56, 189, 248, 0.1);
            --color-border: rgba(51, 65, 85, 0.6);
            --color-surface: #1e293b;
            --color-surface-elevated: #252f47;

            /* Code colors */
            --code-bg: #0f1419;
            --code-border: #1e293b;
            --code-text: #e2e8f0;
        }

        body {
            font-family: var(--font-sans);
            background-color: #0f172a;
            color: var(--color-text-primary);
            line-height: var(--leading-normal);
        }

        .code-font {
            font-family: var(--font-mono);
        }

        .sidebar-item-active {
            background-color: #334155;
            border-left: 4px solid #38bdf8;
        }

        [x-cloak] {
            display: none !important;
        }

        .surface {
            background-color: #1e293b;
            border: 1px solid #334155;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        .docs-content h2 {
            scroll-margin-top: 5rem;
        }

        /* ============================================
           JOURNAL / DOCUMENTATION TYPOGRAPHY
           Enterprise-grade styling for markdown content
           ============================================ */

        /* Container */
        .journal-content {
            font-family: var(--font-sans);
            line-height: var(--leading-relaxed);
            color: var(--color-text-primary);
            max-width: 75ch;
        }

        /* Headings - Visual Hierarchy */
        .journal-content h1 {
            font-family: var(--font-display);
            font-size: 2.25rem;
            font-weight: 700;
            line-height: var(--leading-tight);
            color: #ffffff;
            margin: 0 0 var(--space-6) 0;
            padding-bottom: var(--space-4);
            border-bottom: 2px solid var(--color-accent);
            letter-spacing: -0.02em;
        }

        .journal-content h2 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 600;
            line-height: var(--leading-snug);
            color: #f1f5f9;
            margin: var(--space-10) 0 var(--space-4) 0;
            padding-bottom: var(--space-2);
            border-bottom: 1px solid var(--color-border);
            scroll-margin-top: 6rem;
        }

        .journal-content h3 {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 600;
            line-height: var(--leading-snug);
            color: #e2e8f0;
            margin: var(--space-8) 0 var(--space-3) 0;
        }

        .journal-content h4 {
            font-family: var(--font-display);
            font-size: 1.125rem;
            font-weight: 600;
            line-height: var(--leading-snug);
            color: var(--color-text-primary);
            margin: var(--space-6) 0 var(--space-2) 0;
        }

        .journal-content h5,
        .journal-content h6 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--color-text-secondary);
            margin: var(--space-4) 0 var(--space-2) 0;
        }

        /* Paragraphs */
        .journal-content p {
            margin: 0 0 var(--space-4) 0;
            color: var(--color-text-primary);
            max-width: 70ch;
        }

        /* Links */
        .journal-content a {
            color: var(--color-accent);
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s ease;
        }

        .journal-content a:hover {
            border-bottom-color: var(--color-accent);
        }

        /* Strong and Emphasis */
        .journal-content strong {
            font-weight: 600;
            color: #ffffff;
        }

        .journal-content em {
            font-style: italic;
            color: var(--color-text-secondary);
        }

        /* Lists */
        .journal-content ul,
        .journal-content ol {
            margin: 0 0 var(--space-4) 0;
            padding-left: var(--space-6);
        }

        .journal-content li {
            margin: var(--space-2) 0;
            position: relative;
        }

        .journal-content ul li::marker {
            color: var(--color-accent);
        }

        .journal-content ol li::marker {
            color: var(--color-text-secondary);
            font-weight: 500;
        }

        /* Nested lists */
        .journal-content li>ul,
        .journal-content li>ol {
            margin: var(--space-2) 0 var(--space-2) var(--space-2);
        }

        /* Code - Inline */
        .journal-content code {
            font-family: var(--font-mono);
            font-size: 0.875em;
            background: var(--color-accent-soft);
            color: var(--color-accent);
            padding: 0.125rem 0.375rem;
            border-radius: 0.25rem;
            font-weight: 500;
        }

        /* Code - Blocks */
        .journal-content pre {
            background: var(--code-bg);
            border: 1px solid var(--code-border);
            border-radius: 0.75rem;
            padding: var(--space-4) var(--space-5);
            margin: var(--space-5) 0;
            overflow-x: auto;
            position: relative;
        }

        .journal-content pre::before {
            content: 'python';
            position: absolute;
            top: 0;
            right: 0;
            background: var(--color-surface);
            color: var(--color-text-muted);
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-bottom-left-radius: 0.5rem;
            font-family: var(--font-mono);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .journal-content pre code {
            background: transparent;
            color: var(--code-text);
            padding: 0;
            border-radius: 0;
            font-size: 0.875rem;
            line-height: 1.7;
            display: block;
        }

        /* Tables - Enterprise Style */
        .journal-content table {
            width: 100%;
            border-collapse: collapse;
            margin: var(--space-6) 0;
            font-size: 0.9375rem;
            background: var(--color-surface);
            border-radius: 0.5rem;
            overflow: hidden;
            border: 1px solid var(--color-border);
        }

        .journal-content thead {
            background: var(--color-surface-elevated);
        }

        .journal-content th {
            font-family: var(--font-display);
            font-weight: 600;
            text-align: left;
            padding: var(--space-3) var(--space-4);
            color: #ffffff;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            border-bottom: 2px solid var(--color-border);
        }

        .journal-content td {
            padding: var(--space-3) var(--space-4);
            border-bottom: 1px solid var(--color-border);
            color: var(--color-text-primary);
            vertical-align: top;
        }

        .journal-content tbody tr:last-child td {
            border-bottom: none;
        }

        .journal-content tbody tr:hover {
            background: rgba(56, 189, 248, 0.05);
        }

        /* Blockquotes / Callouts */
        .journal-content blockquote {
            margin: var(--space-5) 0;
            padding: var(--space-4) var(--space-5);
            border-left: 4px solid var(--color-accent);
            background: var(--color-accent-soft);
            border-radius: 0 0.5rem 0.5rem 0;
            font-style: italic;
            color: var(--color-text-secondary);
        }

        .journal-content blockquote p {
            margin: 0;
        }

        /* Horizontal Rule */
        .journal-content hr {
            border: none;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--color-border), transparent);
            margin: var(--space-10) 0;
        }

        /* Checklists (Task Lists) */
        .journal-content input[type="checkbox"] {
            accent-color: var(--color-accent);
            margin-right: var(--space-2);
        }

        /* Definition Lists (if used) */
        .journal-content dl {
            margin: var(--space-4) 0;
        }

        .journal-content dt {
            font-weight: 600;
            color: var(--color-accent);
            margin-top: var(--space-3);
        }

        .journal-content dd {
            margin-left: var(--space-4);
            color: var(--color-text-secondary);
        }

        /* Keyboard shortcuts */
        .journal-content kbd {
            font-family: var(--font-mono);
            font-size: 0.8em;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 0.25rem;
            padding: 0.125rem 0.375rem;
            box-shadow: 0 1px 0 var(--color-border);
        }

        /* Selection */
        .journal-content ::selection {
            background: rgba(56, 189, 248, 0.3);
            color: #ffffff;
        }

        /* Responsive Typography */
        @media (max-width: 768px) {
            .journal-content h1 {
                font-size: 1.75rem;
            }

            .journal-content h2 {
                font-size: 1.25rem;
            }

            .journal-content h3 {
                font-size: 1.125rem;
            }

            .journal-content pre {
                padding: var(--space-3);
                font-size: 0.8125rem;
            }
        }

        /* ============================================
           ENTERPRISE DESIGN SYSTEM
           Professional, accessible, responsive UI
           ============================================ */

        /* CSS Reset & Base */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        body {
            font-family: var(--font-sans);
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            background-attachment: fixed;
            color: var(--color-text-primary);
            line-height: var(--leading-normal);
            min-height: 100vh;
        }

        /* Enhanced Color System */
        :root {
            /* Primary Brand Colors */
            --primary-50: #f0f9ff;
            --primary-100: #e0f2fe;
            --primary-200: #bae6fd;
            --primary-300: #7dd3fc;
            --primary-400: #38bdf8;
            --primary-500: #0ea5e9;
            --primary-600: #0284c7;
            --primary-700: #0369a1;
            --primary-800: #075985;
            --primary-900: #0c4a6e;

            /* Semantic Colors */
            --success-500: #10b981;
            --success-100: #d1fae5;
            --warning-500: #f59e0b;
            --warning-100: #fef3c7;
            --danger-500: #ef4444;
            --danger-100: #fee2e2;
            --info-500: #3b82f6;
            --info-100: #dbeafe;

            /* Neutral Scale */
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;

            /* Shadows */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -2px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.4);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.4), 0 8px 10px -6px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 20px rgba(56, 189, 248, 0.15);

            /* Border Radius */
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --radius-full: 9999px;

            /* Transitions */
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 300ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Enterprise Card Component */
        .enterprise-card {
            background: linear-gradient(145deg, var(--gray-800) 0%, rgba(30, 41, 59, 0.9) 100%);
            border: 1px solid rgba(51, 65, 85, 0.5);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            transition: all var(--transition-base);
            overflow: hidden;
            position: relative;
        }

        .enterprise-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.03) 0%, transparent 50%);
            pointer-events: none;
        }

        .enterprise-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg), var(--shadow-glow);
            border-color: rgba(56, 189, 248, 0.3);
        }

        .enterprise-card-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .enterprise-card-body {
            padding: 1.5rem;
        }

        .enterprise-card-footer {
            padding: 1rem 1.5rem;
            background: rgba(15, 23, 42, 0.3);
            border-top: 1px solid rgba(51, 65, 85, 0.3);
        }

        /* Enterprise Button System */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.625rem 1.25rem;
            font-size: 0.875rem;
            font-weight: 500;
            line-height: 1.5;
            border-radius: var(--radius-md);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all var(--transition-fast);
            text-decoration: none;
            white-space: nowrap;
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-500) 0%, var(--primary-600) 100%);
            color: white;
            border-color: var(--primary-600);
            box-shadow: var(--shadow-sm), 0 0 0 1px rgba(56, 189, 248, 0.2) inset;
        }

        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--primary-400) 0%, var(--primary-500) 100%);
            box-shadow: var(--shadow-md), 0 0 20px rgba(56, 189, 248, 0.3), 0 0 0 1px rgba(56, 189, 248, 0.3) inset;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(51, 65, 85, 0.5);
            color: var(--gray-200);
            border-color: rgba(71, 85, 105, 0.6);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(71, 85, 105, 0.6);
            border-color: var(--gray-500);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success-500) 0%, #059669 100%);
            color: white;
            border-color: #059669;
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger-500) 0%, #dc2626 100%);
            color: white;
            border-color: #dc2626;
        }

        .btn-ghost {
            background: transparent;
            color: var(--gray-400);
            border-color: transparent;
        }

        .btn-ghost:hover:not(:disabled) {
            background: rgba(51, 65, 85, 0.3);
            color: var(--gray-200);
        }

        .btn-sm {
            padding: 0.375rem 0.875rem;
            font-size: 0.8125rem;
        }

        .btn-lg {
            padding: 0.875rem 1.75rem;
            font-size: 1rem;
        }

        /* Enterprise Input System */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.375rem;
        }

        .input-label {
            font-size: 0.875rem;
            color: var(--gray-300);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .input-field {
            width: 100%;
            padding: 0.625rem 0.875rem;
            font-size: 0.875rem;
            line-height: 1.5;
            color: var(--gray-100);
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(71, 85, 105, 0.6);
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
        }

        .input-field::placeholder {
            color: var(--gray-500);
        }

        .input-field:hover {
            border-color: var(--gray-500);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1), 0 0 0 1px rgba(56, 189, 248, 0.2) inset;
        }

        .input-field:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Status Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
            font-weight: 600;
            line-height: 1;
            border-radius: var(--radius-full);
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .badge-info {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .badge-default {
            background: rgba(100, 116, 139, 0.15);
            color: #94a3b8;
            border: 1px solid rgba(100, 116, 139, 0.3);
        }

        /* Stats Display */
        .stat-card {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--gray-400);
            font-weight: 500;
        }

        .stat-value {
            font-size: 1.875rem;
            font-weight: 700;
            color: white;
            line-height: 1.2;
        }

        .stat-change {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .stat-change.positive {
            color: var(--success-500);
        }

        .stat-change.negative {
            color: var(--danger-500);
        }

        /* Data Table */
        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 0.875rem;
        }

        .data-table th {
            text-align: left;
            padding: 0.875rem 1rem;
            font-weight: 600;
            color: var(--gray-300);
            background: rgba(15, 23, 42, 0.5);
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        .data-table td {
            padding: 1rem;
            border-bottom: 1px solid rgba(51, 65, 85, 0.3);
            color: var(--gray-200);
        }

        .data-table tr:hover td {
            background: rgba(56, 189, 248, 0.03);
        }

        /* Loading States */
        .loading-skeleton {
            background: linear-gradient(90deg, rgba(51, 65, 85, 0.3) 25%, rgba(71, 85, 105, 0.5) 50%, rgba(51, 65, 85, 0.3) 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: var(--radius-md);
        }

        @keyframes skeleton-loading {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            text-align: center;
            color: var(--gray-400);
        }

        .empty-state-icon {
            width: 4rem;
            height: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--gray-300);
            margin-bottom: 0.5rem;
        }

        .empty-state-description {
            font-size: 0.875rem;
            max-width: 20rem;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.25rem;
            background: var(--gray-800);
            border: 1px solid rgba(51, 65, 85, 0.5);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            animation: toast-slide-in 0.3s ease-out;
            max-width: 24rem;
        }

        @keyframes toast-slide-in {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {

                updateTime() {
                    const now = new Date();

                async handleRouting() {
                    let hash = window.location.hash || '#/dashboard';
                    const page = hash.replace('#/', '');
                    this.currentTab = page;

                    try {
                        const response = await fetch(`./pages/${page}.html`);
                        if (!response.ok) throw new Error('Page not found');
                        const html = await response.text();

                        outlet.innerHTML = html;

                        if (window.Alpine && typeof window.Alpine.initTree === 'function') {
                            window.Alpine.initTree(outlet);
                        }

                        // Re-initialize Alpine for new content
                        this.$nextTick(() => {
                            if (page === 'dashboard') { this.initChart(); this.initDashboardCharts(); }
                            if (page === 'git') this.initGitTracker();
                            if (page === 'progress') { this.loadProgress(); this.initGitTracker(); }
                            if (page === 'journal') this.initJournal();
                        });
                    } catch (error) {
                        document.getElementById('router-outlet').innerHTML = `<div class="text-rose-500 p-8 flex flex-col items-center justify-center h-full">
                            <svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>

                        </div>`;
                    }
                },
                getSlug(text) {
                    return String(text || '')
                        .trim()
                        .toLowerCase()
                        .replace(/[^\p{L}\p{N}\s-]/gu, '')
                        .replace(/\s+/g, '-')
                        .replace(/-+/g, '-');
                },
                buildTocAndAssignIds(html) {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const headings = Array.from(doc.querySelectorAll('h1, h2, h3'));
                    const toc = [];
                    const used = new Map();

                    headings.forEach(h => {
                        const level = Number(h.tagName.substring(1));
                        const title = (h.textContent || '').trim();
                        if (!title) return;

                        let slug = this.getSlug(title);
                        const count = used.get(slug) || 0;
                        used.set(slug, count + 1);
                        if (count > 0) slug = `${slug}-${count + 1}`;

                        h.id = slug;
                        toc.push({ id: slug, title, level });
                    });

                    return { html: doc.body.innerHTML, toc };
                },
                async initJournal() {
                    const saved = localStorage.getItem('cms_journal_current');
                    if (saved) {
                        this.journal.currentLessonId = saved;
                    }
                    await this.loadJournalLesson(this.journal.currentLessonId);
                },
                async loadJournalLesson(lessonId) {
                    const lesson = this.journal.lessons.find(l => l.id === lessonId) || this.journal.lessons[0];
                    if (!lesson) return;

                    this.journal.currentLessonId = lesson.id;
                    localStorage.setItem('cms_journal_current', lesson.id);
                    this.journal.loading = true;
                    this.journal.error = '';

                    try {
                        if (!window.marked || typeof window.marked.parse !== 'function') {
                            throw new Error('Markdown engine is not loaded');
                        }
                        const res = await fetch(lesson.path);
                        if (!res.ok) throw new Error('Không tìm thấy file .md');
                        const md = await res.text();
                        const rawHtml = window.marked.parse(md);
                        const { html, toc } = this.buildTocAndAssignIds(rawHtml);

                        this.journal.currentLessonTitle = lesson.title;
                        this.journal.currentLessonHtml = html;
                        this.journal.toc = toc;
                    } catch (e) {
                        this.journal.error = e.message || String(e);
                    } finally {
                        this.journal.loading = false;
                    }
                },
                loadProgress() {
                    const savedProgress = localStorage.getItem('cms_progress');
                    if (savedProgress) {
                        this.progress = JSON.parse(savedProgress);
                    }
                },
                initGitTracker() {
                    const savedGit = localStorage.getItem('cms_git');
                    if (savedGit) {
                        const parsed = JSON.parse(savedGit);
                        this.gitTracker = parsed;
                        // Remove .git suffix if present
                        const cleanRepo = parsed.repo ? parsed.repo.replace(/\.git$/, '') : '';
                        this.gitConfig = {
                            username: parsed.username,
                            repo: cleanRepo,
                            token: ''
                        };

                        // Load insights from cache first
                        this.loadGitInsightsFromCache();

                        // Fetch fresh data
                        if (this.gitTracker.username && cleanRepo) {
                            this.fetchCommits();
                            this.fetchGitInsights();

                            // Auto-refresh every 30 minutes to avoid rate limits
                            if (this.gitRefreshInterval) clearInterval(this.gitRefreshInterval);
                            this.gitRefreshInterval = setInterval(() => {
                                // Only auto-refresh on progress page, not git page
                                if (this.currentTab === 'progress') {
                                    this.fetchGitInsights();
                                }
                            }, 30 * 60 * 1000);
                        }
                    }
                },
                async fetchCommits() {
                    if (!this.gitConfig.username || !this.gitConfig.repo) return;

                    this.gitLoading = true;
                    try {
                        const headers = { 'Accept': 'application/vnd.github.v3+json' };
                        if (this.gitConfig.token) {
                            headers['Authorization'] = `token ${this.gitConfig.token}`;
                        }
                        const response = await fetch(`https://api.github.com/repos/${this.gitConfig.username}/${this.gitConfig.repo}/commits`, { headers });
                        if (!response.ok) throw new Error('Repo not found');
                        const data = await response.json();

                        this.commits = data.map(item => {
                            const msg = item.commit.message;
                            const regex = /^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert|feat!|fix!)(\(.+\))?: (.+)/;
                            const match = msg.match(regex);

                            return {
                                sha: item.sha,
                                message: match ? match[3] : msg,
                                type: match ? match[1] : 'unknown',
                                isValid: !!match,
                                error: match ? null : 'Sai định dạng Conventional Commits',
                                date: item.commit.author.date
                            };
                        });

                        localStorage.setItem('cms_git', JSON.stringify({
                            username: this.gitConfig.username,
                            repo: this.gitConfig.repo,
                            token: this.gitConfig.token
                        }));
                    } catch (error) {
                        alert('Lỗi: ' + error.message);
                    } finally {
                        this.gitLoading = false;
                    }
                },
                async fetchGitInsights() {
                    if (!this.gitConfig.username || !this.gitConfig.repo) return;

                    this.gitInsights.loading = true;
                    this.gitInsights.error = null;

                    try {
                        // Fetch only essential data first (commits already fetched separately)
                        // Use Promise.allSettled to handle partial failures
                        const results = await Promise.allSettled([
                            this.fetchPullRequests(),
                            this.fetchIssues(),
                            this.fetchContributors(),
                            this.fetchCommitActivity()
                        ]);

                        // Extract successful results
                        const prs = results[0].status === 'fulfilled' ? results[0].value : { open: 0, closed: 0, merged: 0, items: [] };
                        const issues = results[1].status === 'fulfilled' ? results[1].value : { open: 0, closed: 0, items: [] };
                        const contributors = results[2].status === 'fulfilled' ? results[2].value : [];
                        const activity = results[3].status === 'fulfilled' ? results[3].value : [];

                        // Check if any failed
                        const failed = results.filter(r => r.status === 'rejected');
                        if (failed.length > 0) {
                            console.warn('Some GitHub API calls failed:', failed.map(f => f.reason.message));
                        }

                        this.gitInsights.pullRequests = prs;
                        this.gitInsights.issues = issues;
                        this.gitInsights.contributors = contributors;
                        this.gitInsights.commitActivity = activity;
                        this.gitInsights.lastUpdated = new Date().toISOString();

                        // Cache to localStorage
                        localStorage.setItem('cms_git_insights', JSON.stringify({
                            pullRequests: prs,
                            issues: issues,
                            contributors: contributors,
                            commitActivity: activity,
                            lastUpdated: this.gitInsights.lastUpdated
                        }));
                    } catch (error) {
                        console.error('GitHub Insights Error:', error);
                        this.gitInsights.error = 'GitHub API rate limit reached. Data shown from cache if available.';
                    } finally {
                        this.gitInsights.loading = false;
                    }
                },
                async fetchPullRequests() {
                    const headers = { 'Accept': 'application/vnd.github.v3+json' };
                    if (this.gitConfig.token) {
                        headers['Authorization'] = `token ${this.gitConfig.token}`;
                    }
                    const response = await fetch(`https://api.github.com/repos/${this.gitConfig.username}/${this.gitConfig.repo}/pulls?state=all&per_page=10`, { headers });
                    if (response.status === 403) throw new Error('Rate limited');
                    if (!response.ok) throw new Error('Failed to fetch PRs');
                    const data = await response.json();
                    const open = data.filter(pr => pr.state === 'open').length;
                    const closed = data.filter(pr => pr.state === 'closed' && !pr.merged_at).length;
                    const merged = data.filter(pr => pr.merged_at).length;
                    return {
                        open, closed, merged,
                        items: data.slice(0, 5).map(pr => ({
                            number: pr.number, title: pr.title, state: pr.state,
                            merged: !!pr.merged_at, author: pr.user.login,
                            created_at: pr.created_at, updated_at: pr.updated_at, html_url: pr.html_url
                        }))
                    };
                },
                async fetchIssues() {
                    const headers = { 'Accept': 'application/vnd.github.v3+json' };
                    if (this.gitConfig.token) {
                        headers['Authorization'] = `token ${this.gitConfig.token}`;
                    }
                    const response = await fetch(`https://api.github.com/repos/${this.gitConfig.username}/${this.gitConfig.repo}/issues?state=all&per_page=10`, { headers });
                    if (response.status === 403) throw new Error('Rate limited');
                    if (!response.ok) throw new Error('Failed to fetch issues');
                    const data = await response.json();
                    const actualIssues = data.filter(item => !item.pull_request);
                    const open = actualIssues.filter(issue => issue.state === 'open').length;
                    const closed = actualIssues.filter(issue => issue.state === 'closed').length;
                    return {
                        open, closed,
                        items: actualIssues.slice(0, 5).map(issue => ({
                            number: issue.number, title: issue.title, state: issue.state,
                            author: issue.user.login, created_at: issue.created_at,
                            updated_at: issue.updated_at, labels: issue.labels.map(l => l.name),
                            html_url: issue.html_url
                        }))
                    };
                },
                async fetchContributors() {
                    const headers = { 'Accept': 'application/vnd.github.v3+json' };
                    if (this.gitConfig.token) {
                        headers['Authorization'] = `token ${this.gitConfig.token}`;
                    }
                    const response = await fetch(`https://api.github.com/repos/${this.gitConfig.username}/${this.gitConfig.repo}/contributors`, { headers });
                    if (response.status === 403) throw new Error('Rate limited');
                    if (!response.ok) throw new Error('Failed to fetch contributors');
                    const data = await response.json();
                    return data.slice(0, 5).map(c => ({
                        login: c.login, avatar_url: c.avatar_url,
                        contributions: c.contributions, html_url: c.html_url
                    }));
                },
                async fetchCommitActivity() {
                    const headers = { 'Accept': 'application/vnd.github.v3+json' };
                    if (this.gitConfig.token) {
                        headers['Authorization'] = `token ${this.gitConfig.token}`;
                    }
                    const response = await fetch(`https://api.github.com/repos/${this.gitConfig.username}/${this.gitConfig.repo}/stats/commit_activity`, { headers });
                    if (response.status === 403) throw new Error('Rate limited');
                    if (!response.ok) return [];
                    const data = await response.json();
                    return data ? data.slice(-14).map(week => ({ week: week.week, total: week.total, days: week.days })) : [];
                },
                async testGitHubConnection() {
                    this.gitTestResult = null;

                    if (!this.gitConfig.username || !this.gitConfig.repo) {
                        this.gitTestResult = { success: false, message: 'Vui lòng nhập username và repository' };
                        return;
                    }

                    const cleanRepo = this.gitConfig.repo.replace(/\.git$/, '');
                    const headers = { 'Accept': 'application/vnd.github.v3+json' };

                    if (this.gitConfig.token) {
                        headers['Authorization'] = `token ${this.gitConfig.token}`;
                    }

                    try {
                        const response = await fetch(
                            `https://api.github.com/repos/${this.gitConfig.username}/${cleanRepo}`,
                            { headers }
                        );

                        const rateLimitRemaining = response.headers.get('x-ratelimit-remaining');
                        const rateLimitLimit = response.headers.get('x-ratelimit-limit');

                        if (response.ok) {
                            const data = await response.json();
                            this.gitTestResult = {
                                success: true,
                                message: `✓ Connected to ${data.full_name} (${data.private ? 'private' : 'public'} repo)`,
                                rateLimit: `${rateLimitRemaining}/${rateLimitLimit} requests remaining`
                            };
                        } else if (response.status === 403) {
                            this.gitTestResult = {
                                success: false,
                                message: '✗ API rate limit exceeded. Please add a Personal Access Token.',
                                rateLimit: `0/${rateLimitLimit} requests remaining`
                            };
                        } else if (response.status === 404) {
                            this.gitTestResult = {
                                success: false,
                                message: '✗ Repository not found or not accessible'
                            };
                        } else {
                            this.gitTestResult = {
                                success: false,
                                message: `✗ Error: ${response.statusText}`
                            };
                        }
                    } catch (error) {
                        this.gitTestResult = {
                            success: false,
                            message: `✗ Network error: ${error.message}`
                        };
                    }
                },
                saveGitConfig() {
                    const cleanRepo = this.gitConfig.repo ? this.gitConfig.repo.replace(/\.git$/, '') : '';
                    const config = {
                        username: this.gitConfig.username,
                        repo: cleanRepo,
                        token: this.gitConfig.token
                    };
                    localStorage.setItem('cms_git', JSON.stringify(config));
                    alert('Đã lưu cấu hình GitHub!');
                },
                loadGitInsightsFromCache() {
                    const cached = localStorage.getItem('cms_git_insights');
                    if (cached) {
                        const parsed = JSON.parse(cached);
                        this.gitInsights.pullRequests = parsed.pullRequests || { open: 0, closed: 0, merged: 0, items: [] };
                        this.gitInsights.issues = parsed.issues || { open: 0, closed: 0, items: [] };
                        this.gitInsights.contributors = parsed.contributors || [];
                        this.gitInsights.commitActivity = parsed.commitActivity || [];
                        this.gitInsights.lastUpdated = parsed.lastUpdated;
                    }
                },
                formatDate(dateStr) {
                    const d = new Date(dateStr);
                    return d.toLocaleDateString('vi-VN') + ' ' + d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
                },
                formatTimeAgo(dateStr) {
                    const date = new Date(dateStr);
                    const now = new Date();
                    const seconds = Math.floor((now - date) / 1000);

                    if (seconds < 60) return 'vừa xong';
                    const minutes = Math.floor(seconds / 60);
                    if (minutes < 60) return minutes + ' phút trước';
                    const hours = Math.floor(minutes / 60);
                    if (hours < 24) return hours + ' giờ trước';
                    const days = Math.floor(hours / 24);
                    if (days < 7) return days + ' ngày trước';
                    const weeks = Math.floor(days / 7);
                    if (weeks < 4) return weeks + ' tuần trước';
                    const months = Math.floor(days / 30);
                    if (months < 12) return months + ' tháng trước';
                    return Math.floor(days / 365) + ' năm trước';
                },
                copyToClipboard(text) {
                    navigator.clipboard.writeText(text).then(() => {
                        alert('Đã copy mã nguồn!');
                    });
                },
                loadData() {
                    fetch('../roadmap_data.json')
                        .then(res => res.json())
                        .then(data => { this.roadmap = data; });
                    const savedDocs = localStorage.getItem('cms_docs');
                    if (savedDocs) {
                        this.docs = JSON.parse(savedDocs);
                        const firstPhase = Object.values(this.docs)[0];
                        if (firstPhase && firstPhase.sessions.length > 0) {
                            this.activeSessionData = firstPhase.sessions[0];
                            this.currentSession = this.activeSessionData.id;
                        }
                    }
                },
                getPageTitle() {
                    return this.menuItems.find(i => i.id === this.currentTab).label;
                },
                initChart() {
                    setTimeout(() => {
                        const ctx = document.getElementById('progressChart').getContext('2d');
                        new Chart(ctx, {
                            type: 'bar',
                            data: {
                                labels: ['GĐ 1', 'GĐ 2', 'GĐ 3', 'GĐ 4', 'GĐ 5'],
                                datasets: [{
                                    label: '% Hoàn thành',
                                    data: [35, 0, 0, 0, 0],
                                    backgroundColor: '#38bdf8',
                                    borderRadius: 6
                                }]
                            },
                            options: {
                                indexAxis: 'y',
                                responsive: true,
                                plugins: { legend: { display: false } },
                                scales: { x: { max: 100, grid: { display: false } }, y: { grid: { display: false } } }
                            }
                        });
                    }, 500);
                },
                initDashboardCharts() {
                    setTimeout(() => {
                        // Commit Activity Chart
                        const commitCtx = document.getElementById('commitChart');
                        if (commitCtx && this.gitInsights?.commitActivity?.length > 0) {
                            const weeks = this.gitInsights.commitActivity.map(w => {
                                const date = new Date(w.week * 1000);
                                return 'W' + this.getWeekNumber(date);
                            });
                            const commits = this.gitInsights.commitActivity.map(w => w.total);

                            new Chart(commitCtx, {
                                type: 'line',
                                data: {
                                    labels: weeks,
                                    datasets: [{
                                        label: 'Commits',
                                        data: commits,
                                        borderColor: '#38bdf8',
                                        backgroundColor: 'rgba(56, 189, 248, 0.1)',
                                        fill: true,
                                        tension: 0.4,
                                        pointRadius: 3,
                                        pointBackgroundColor: '#38bdf8'
                                    }]
                                },
                                options: {
                                    responsive: true,
                                    maintainAspectRatio: false,
                                    plugins: { legend: { display: false } },
                                    scales: {
                                        y: { beginAtZero: true, grid: { color: 'rgba(148, 163, 184, 0.1)' }, ticks: { color: '#94a3b8' } },
                                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                                    }
                                }
                            });
                        }

                        // Contributors Chart
                        const contributorCtx = document.getElementById('contributorChart');
                        if (contributorCtx && this.gitInsights?.contributors?.length > 0) {
                            const names = this.gitInsights.contributors.slice(0, 8).map(c => c.login);
                            const contributions = this.gitInsights.contributors.slice(0, 8).map(c => c.contributions);

                            new Chart(contributorCtx, {
                                type: 'bar',
                                data: {
                                    labels: names,
                                    datasets: [{
                                        label: 'Contributions',
                                        data: contributions,
                                        backgroundColor: '#10b981',
                                        borderRadius: 4
                                    }]
                                },
                                options: {
                                    responsive: true,
                                    maintainAspectRatio: false,
                                    plugins: { legend: { display: false } },
                                    scales: {
                                        y: { beginAtZero: true, grid: { color: 'rgba(148, 163, 184, 0.1)' }, ticks: { color: '#94a3b8' } },
                                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                                    }
                                }
                            });
                        }
                    }, 500);
                },
                getWeekNumber(date) {
                    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
                    const dayNum = d.getUTCDay() || 7;
                    d.setUTCDate(d.getUTCDate() + 4 - dayNum);
                    const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
                    return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
                },
            }
        }
    </script>
