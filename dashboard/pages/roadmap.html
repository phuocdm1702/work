<div class="max-w-4xl mx-auto py-8" x-cloak>
    <div class="flex items-center justify-between mb-8 fade-in">
        <div>
            <h2 class="text-2xl font-bold text-white">Lộ trình học tập 8 tháng</h2>
            <p class="text-sm text-slate-400 mt-1">Roadmap chi tiết cho Python Fullstack Developer</p>
        </div>
        <div class="enterprise-card px-4 py-2">
            <span class="text-xs text-slate-400">Cập nhật: 25/03/2026</span>
        </div>
    </div>

    <div class="relative pl-8 border-l-2 border-slate-700 space-y-12">
        <template x-for="phase in roadmap.phases" :key="phase.id">
            <div class="relative">
                <!-- Node Circle -->
                <div :class="{
                    'bg-sky-500': phase.id === 1,
                    'bg-slate-700': phase.id > 1
                }" class="absolute -left-[41px] w-5 h-5 rounded-full border-4 border-slate-900 transition-colors">
                </div>

                <div class="enterprise-card fade-in" :style="'animation-delay: ' + (phase.id * 0.1) + 's'">
                    <div class="enterprise-card-header">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-lg bg-sky-500/20 flex items-center justify-center">
                                <span class="text-sky-400 font-bold" x-text="phase.id"></span>
                            </div>
                            <h3 class="text-xl font-bold text-sky-400" x-text="phase.title"></h3>
                        </div>
                        <span class="badge badge-default">Giai đoạn <span x-text="phase.id"></span></span>
                    </div>

                    <div class="enterprise-card-body">
                        <div class="grid gap-4">
                            <template x-for="week in phase.weeks" :key="week.week">
                                <div class="enterprise-card border-l-4" :class="{
                                    'border-l-sky-500': week.status === 'in_progress',
                                    'border-l-emerald-500': week.status === 'completed',
                                    'border-l-slate-600': week.status === 'pending' || week.status === 'locked'
                                }">
                                    <div class="enterprise-card-body py-4">
                                        <div class="flex justify-between items-center mb-3">
                                            <div class="flex items-center gap-3">
                                                <span
                                                    class="w-8 h-8 rounded-lg bg-slate-700 flex items-center justify-center text-xs font-bold text-white"
                                                    x-text="'W'+week.week"></span>
                                                <span class="font-bold text-slate-200" x-text="week.topic"></span>
                                            </div>
                                            <span :class="{
                                                'badge badge-info': week.status === 'in_progress',
                                                'badge badge-success': week.status === 'completed',
                                                'badge badge-default': week.status === 'pending' || week.status === 'locked'
                                            }"
                                                x-text="week.status === 'in_progress' ? 'Đang học' : (week.status === 'completed' ? 'Hoàn thành' : (week.status === 'locked' ? 'Chưa mở' : 'Chờ học'))"></span>
                                        </div>
                                        <ul class="text-sm text-slate-400 space-y-2 ml-11">
                                            <template x-for="detail in week.details" :key="detail">
                                                <li class="flex items-start gap-2">
                                                    <svg class="w-4 h-4 mt-0.5 text-sky-500/50 shrink-0" fill="none"
                                                        stroke="currentColor" viewBox="0 0 24 24">
                                                        <path stroke-linecap="round" stroke-linejoin="round"
                                                            stroke-width="2" d="M9 5l7 7-7 7" />
                                                    </svg>
                                                    <span x-text="detail"></span>
                                                </li>
                                            </template>
                                        </ul>
                                        <div class="mt-4 flex justify-end">
                                            <button
                                                @click="currentTab = 'docs'; currentSession = 's01-setup'; window.location.hash = '#/docs'"
                                                class="btn btn-ghost btn-sm">
                                                <span>Xem tài liệu</span>
                                                <svg class="w-3 h-3" fill="none" stroke="currentColor"
                                                    viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round"
                                                        stroke-width="2" d="M14 5l7 7-7 7" />
                                                </svg>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>
</div>
