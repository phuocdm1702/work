<div class="h-full flex flex-col" x-cloak>
    <div class="flex gap-6 h-full overflow-hidden">
        <!-- Lessons List -->
        <aside class="w-80 flex flex-col gap-4 overflow-y-auto pr-2 custom-scrollbar">
            <div class="enterprise-card">
                <div class="enterprise-card-header">
                    <div>
                        <h4 class="font-bold text-xs text-slate-500 uppercase tracking-widest">Nhật ký học</h4>
                        <p class="text-xs text-slate-400 mt-1">Tổng hợp kiến thức theo từng buổi (Markdown)</p>
                    </div>
                </div>
                <div class="enterprise-card-body space-y-2">
                    <template x-for="lesson in journal.lessons" :key="lesson.id">
                        <button @click="loadJournalLesson(lesson.id)"
                            :class="journal.currentLessonId === lesson.id ? 'text-sky-400 bg-sky-500/10 border-sky-500/40' : 'text-slate-300 hover:bg-slate-800/50 border-transparent'"
                            class="w-full text-left p-4 rounded-lg border transition-all">
                            <div class="font-bold text-sm" x-text="lesson.title"></div>
                            <div class="text-xs text-slate-500 mt-1" x-text="lesson.path"></div>
                        </button>
                    </template>
                    <div class="mt-4 text-xs text-slate-500 leading-relaxed p-3 bg-slate-800/30 rounded-lg">
                        Lưu ý: Để load được file <span class="text-slate-300">.md</span>, bạn cần mở Dashboard qua web
                        server (Live Server hoặc <span class="code-font text-slate-300">python -m http.server</span>).
                    </div>
                </div>
            </div>
        </aside>

        <!-- Content Area -->
        <div class="flex-1 flex flex-col min-w-0">
            <article class="flex-1 enterprise-card overflow-y-auto custom-scrollbar p-10 docs-content">
                <div class="max-w-4xl mx-auto">
                    <div class="flex items-start justify-between gap-4 mb-8">
                        <div class="min-w-0">
                            <div class="text-xs text-slate-500 font-medium">Buổi học</div>
                            <h1 class="text-3xl font-extrabold text-white tracking-tight mt-1"
                                x-text="journal.currentLessonTitle || 'Chọn một buổi học'"></h1>
                        </div>
                        <div class="flex items-center gap-2">
                            <button @click="loadJournalLesson(journal.currentLessonId)"
                                class="btn btn-secondary btn-sm">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                                </svg>
                                <span>Reload</span>
                            </button>
                        </div>
                    </div>

                    <template x-if="journal.loading">
                        <div class="flex items-center gap-3 text-slate-400">
                            <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-sky-500"></div>
                            <span class="text-sm">Đang tải nội dung...</span>
                        </div>
                    </template>

                    <template x-if="journal.error">
                        <div class="enterprise-card border-l-4 border-l-rose-500 bg-rose-500/10">
                            <div class="enterprise-card-body">
                                <div class="font-bold text-rose-400">Không thể tải nhật ký</div>
                                <div class="text-sm mt-2 text-rose-200" x-text="journal.error"></div>
                            </div>
                        </div>
                    </template>

                    <template x-if="!journal.loading && !journal.error && journal.currentLessonHtml">
                        <div class="journal-content">
                            <div x-html="journal.currentLessonHtml"></div>
                        </div>
                    </template>
                </div>
            </article>
        </div>

        <!-- TOC -->
        <aside class="w-72 hidden xl:block">
            <div class="enterprise-card sticky top-0">
                <div class="enterprise-card-header">
                    <h4 class="text-xs font-bold text-slate-500 uppercase tracking-widest">Mục lục</h4>
                </div>
                <div class="enterprise-card-body">
                    <template x-if="!journal.toc || journal.toc.length === 0">
                        <div class="text-sm text-slate-500">Chưa có mục lục</div>
                    </template>
                    <ul x-show="journal.toc && journal.toc.length > 0" class="space-y-3">
                        <template x-for="item in journal.toc" :key="item.id">
                            <li>
                                <a :href="'#' + item.id"
                                    class="text-sm text-slate-400 hover:text-sky-400 transition-colors block py-1"
                                    :style="'padding-left: ' + ((item.level - 1) * 12) + 'px;'" x-text="item.title"></a>
                            </li>
                        </template>
                    </ul>
                </div>
            </div>
        </aside>
    </div>
</div>

<ul class="space-y-2">
    <template x-for="item in journal.toc" :key="item.id">
        <li>
            <a :href="'#' + item.id"
                :class="item.level === 1 ? 'font-bold text-slate-200' : (item.level === 2 ? 'text-slate-300' : 'text-slate-400')"
                class="text-sm hover:text-sky-400 transition-colors block py-1"
                :style="item.level === 3 ? 'padding-left: 12px' : (item.level === 2 ? 'padding-left: 6px' : 'padding-left: 0px')"
                x-text="item.title"></a>
        </li>
    </template>
</ul>
</div>
</aside>
</div>
</div>
